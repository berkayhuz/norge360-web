apiVersion: apps/v1
kind: Deployment
metadata:
  name: norge360-public-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: norge360-public-web
  template:
    metadata:
      labels:
        app: norge360-public-web
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: public-web
          image: ghcr.io/berkayhuz/norge360-public-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: Production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: NEXT_PUBLIC_SITE_URL
              value: https://norge360.com
            - name: PUBLIC_WEB_APP_URL
              value: https://norge360.com
            - name: NEXT_PUBLIC_AUTH_WEB_URL
              value: https://auth.norge360.com
            - name: GATEWAY_API_BASE_URL
              value: http://norge360-gateway:8080
            - name: INTERNAL_API_BASE_URL
              value: http://norge360-gateway:8080
            - name: AUTH_ACCESS_COOKIE_NAME
              value: Norge360-access
            - name: AUTH_SESSION_COOKIE_NAME
              value: Norge360-session
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: norge360-auth-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: norge360-auth-web
  template:
    metadata:
      labels:
        app: norge360-auth-web
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-web
          image: ghcr.io/berkayhuz/norge360-auth-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: Production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: AUTH_API_BASE_URL
              value: http://norge360-auth-api:8080
            - name: AUTH_WEB_APP_URL
              value: https://auth.norge360.com
            - name: POST_LOGIN_REDIRECT_URL
              value: https://norge360.com/
            - name: ALLOWED_REDIRECT_ORIGINS
              value: https://norge360.com,https://www.norge360.com,https://auth.norge360.com
            - name: AUTH_COOKIE_DOMAIN
              value: .norge360.com
            - name: AUTH_ACCESS_COOKIE_NAME
              value: Norge360-access
            - name: AUTH_REFRESH_COOKIE_NAME
              value: Norge360-refresh
            - name: AUTH_SESSION_COOKIE_NAME
              value: Norge360-session
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
