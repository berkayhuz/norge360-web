apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: norge360-public-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: norge360-public-web
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: norge360-auth-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: norge360-auth-web
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
