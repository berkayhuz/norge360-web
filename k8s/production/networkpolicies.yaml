apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: norge360-default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: norge360-allow-same-namespace-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: norge360-web-production
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: norge360-allow-ingress-controller-to-edge
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - norge360-public-web
          - norge360-auth-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: norge360-allow-backend-egress
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - norge360-public-web
          - norge360-auth-web
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
