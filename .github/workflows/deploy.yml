name: Deploy Norge360 Web

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy auth-web on frontend server
        run: |
          set -e

          cd /opt/norge360-web

          git fetch origin main
          git reset --hard origin/main

          docker compose up -d --build

          docker image prune -f