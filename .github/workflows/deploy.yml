name: Deploy Norge360 Web

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy on frontend server
        run: |
          set -e

          cd /opt/norge360-web

          git fetch origin main
          git reset --hard origin/main

          pnpm install --frozen-lockfile
          pnpm build

          # Docker compose varsa sonra burayı compose'a çeviririz.