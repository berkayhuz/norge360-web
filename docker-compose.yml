services:
  public-web:
    build:
      context: .
      dockerfile: Dockerfile.public-web
    container_name: norge360-public-web
    restart: unless-stopped
    env_file:
      - ./.env.local
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  auth-web:
    build:
      context: .
      dockerfile: Dockerfile.auth-web
    container_name: norge360-auth-web
    restart: unless-stopped
    env_file:
      - ./.env.local
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2.10-alpine
    container_name: norge360-web-caddy
    restart: unless-stopped
    depends_on:
      public-web:
        condition: service_healthy
      auth-web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
